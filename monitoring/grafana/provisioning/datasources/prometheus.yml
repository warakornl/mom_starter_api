# Grafana datasource provisioning — Prometheus
# Auto-provisioned on container start; no manual UI setup needed.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus-ds
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: "2.52.0"
      timeInterval: "15s"
    editable: false
