# Prometheus configuration — development / Docker Compose
# Scrapes mom-starter-api every 15 seconds.
# Full actuator URL: http://api:8080/v1/actuator/prometheus
#   /v1   = server.servlet.context-path
#   /actuator = management.endpoints.web.base-path

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: docker-dev

scrape_configs:
  - job_name: "mom-starter-api"
    metrics_path: /v1/actuator/prometheus
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "api:8080"
        labels:
          application: "mom-starter-api"
