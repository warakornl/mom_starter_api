# Test profile — in-memory H2 in PostgreSQL-compatibility mode.
# Flyway is OFF here for the bare smoke test (Task 0.1); migration-backed
# @DataJpaTest slices (Task 0.2+) enable it explicitly.
spring:
  datasource:
    url: jdbc:h2:mem:momstarter;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
    # Explicitly restrict to db/migration (H2-compatible scripts only).
    # db/pg-only (PL/pgSQL trigger V20260710000024) is excluded — H2 cannot execute it.
    # @DataJpaTest slices that enable Flyway explicitly will inherit this locations value,
    # ensuring they never attempt to run PL/pgSQL scripts against H2.
    # INV-ASD-8 is still fully asserted on H2 via column-absence and sync-apply e2e tests
    # (see V20260710000024 PRIMARY CONTROL comment); the trigger is DB-layer defense-in-depth.
    locations: classpath:db/migration

# Effectively disable rate limiting in the test profile so MVC tests don't trip the
# shared in-memory limiter; the limiter itself is unit-tested in RateLimiterTest.
momstarter:
  ratelimit:
    login-per-ip-per-min: 1000000
    register-per-ip-per-min: 1000000
    resend-per-ip-per-min: 1000000
    forgot-per-ip-per-min: 1000000
    forgot-per-account-per-min: 1000000
    reset-per-ip-per-min: 1000000
    verify-email-per-ip-per-min: 1000000
