# Default / production profile. No secrets hardcoded — everything comes from env
# (Secrets Manager in prod, per docs/architecture/infrastructure-diagram.md).
server:
  servlet:
    context-path: /v1   # API base path /v1 (URI versioning) per docs/api-spec/api-contract.md
spring:
  application:
    name: mom-starter-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/momstarter}
    username: ${DB_USERNAME:momstarter}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none      # schema is owned by Flyway, never by Hibernate
    open-in-view: false
  flyway:
    enabled: true

# Per-IP rate limits (requests / minute). Conservative MVP values — tighten + back with a
# shared store / edge WAF for production (see docs/architecture/infrastructure-diagram.md).
momstarter:
  retention:
    # Tombstone TTL and account-level hard-erasure window in days.
    # Applied by TombstoneGcScheduler → TombstoneGcService + AccountErasureService.
    #
    # LEGAL-PENDING: 180 is an engineering default; it has NOT been confirmed by Thai legal
    # counsel as satisfying PDPA storage limitation (ม.33) and storage-minimisation principles.
    # Do NOT launch to production until legal sign-off on this value
    # (consent-hardgate-erasure-design.md §2.3 / §3.2).
    # Adjust per environment — example: staging=1 to verify GC fires on short-lived data.
    days: 180
  gc:
    # Cron expression for the daily hard-erasure sweep (6-field Spring cron: s m h d M DOW).
    # Default: 20:00 UTC = 03:00 Bangkok ICT (UTC+7) — off-peak for Thai users.
    # Override per environment (e.g. staging: "0 * * * * *" every minute for fast GC testing).
    cron: "0 0 20 * * *"
  ratelimit:
    login-per-ip-per-min: 20
    register-per-ip-per-min: 15
    resend-per-ip-per-min: 10
    forgot-per-ip-per-min: 10
    reset-per-ip-per-min: 10
    # Contract §H: verify-email rate-limited per IP to guard against token guessing
    # (128-bit token is already strong; rate-limit adds defence-in-depth at parity with reset)
    verify-email-per-ip-per-min: 10
  dev:
    # NEVER set to true outside application-local.yml.  The DevModeGuard enforces this
    # at startup and will refuse to boot if it detects a prod profile or a remote DB.
    auto-verify-email: false

# Google sign-in (§J). client-id empty by default -> Google sign-in disabled until configured.
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  jwks-uri: https://www.googleapis.com/oauth2/v3/certs

# ---------------------------------------------------------------------------
# Actuator + Micrometer (observability).
# Runs on the SAME port as the API (8080) inside the Docker network.
# PROD NOTE: Move to a dedicated management port (management.server.port=8081)
# and restrict that port to internal/VPC traffic only — never expose to internet.
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      # base-path is relative to server.servlet.context-path (/v1), so full URLs are:
      #   /v1/actuator/health   /v1/actuator/prometheus   /v1/actuator/info
      base-path: /actuator
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # Enable full histogram buckets so Grafana can compute p50/p95/p99 per endpoint
      percentiles-histogram:
        http.server.requests: true
      # Pre-compute server-side percentile approximations (lower cardinality alternative)
      percentiles:
        http.server.requests: 0.5,0.95,0.99
      # SLO buckets: help count requests faster/slower than each threshold
      slo:
        http.server.requests: 100ms,250ms,500ms,1s
